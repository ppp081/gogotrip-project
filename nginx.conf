server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Browser calls /api/... (VITE_BACKEND_API=/api). Proxy to Django on Cloud Run — not the SPA.
    location /api/ {
        proxy_pass https://tripbot-backend-294086862024.asia-southeast1.run.app/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host tripbot-backend-294086862024.asia-southeast1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # SPA: any path (e.g. /signin) falls back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
