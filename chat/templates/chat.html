<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>GoGo Trip Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; }
        #chatbox { border: 1px solid #ccc; padding: 1rem; height: 400px; overflow-y: auto; }
        .message { margin: 0.5rem 0; }
        .user { text-align: right; color: blue; }
        .bot { text-align: left; color: green; }
        #input-area { margin-top: 1rem; }
        #input-message { width: 80%; padding: 0.5rem; }
        #send-btn { padding: 0.5rem 1rem; }
    </style>
</head>
<body>

<h2>GoGo Trip Chatbot</h2>
<div id="chatbox"></div>

<div id="input-area">
    <input type="text" id="input-message" placeholder="พิมพ์ข้อความ..." autofocus />
    <button id="send-btn">ส่ง</button>
</div>

<script>
    const chatbox = document.getElementById('chatbox');
    const inputMessage = document.getElementById('input-message');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.classList.add('message', sender);
        div.textContent = text;
        chatbox.appendChild(div);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage() {
        const message = inputMessage.value.trim();
        if (!message) return;

        appendMessage(message, 'user');
        inputMessage.value = '';
        inputMessage.disabled = true;
        sendBtn.disabled = true;

        try {
            const response = await fetch('/ask/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();

            if (response.ok) {
                appendMessage(data.reply, 'bot');
            } else {
                appendMessage('เกิดข้อผิดพลาด: ' + (data.error || 'ไม่ทราบสาเหตุ'), 'bot');
            }
        } catch (error) {
            appendMessage('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'bot');
        }

        inputMessage.disabled = false;
        sendBtn.disabled = false;
        inputMessage.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputMessage.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
